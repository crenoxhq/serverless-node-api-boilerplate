name: Compare Secrets Scanners

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Mobile / Web UI

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Boilerplate Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Clone and Build Crenox (from dev branch)
        run: |
          git clone https://github.com/crenoxhq/crenox.git /tmp/crenox-src
          cd /tmp/crenox-src
          git checkout dev
          go build -trimpath -o /tmp/crenox ./cmd/crenox/
          sudo mv /tmp/crenox /usr/local/bin/crenox

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Install Betterleaks (Public Module)
        run: |
          go install github.com/betterleaks/betterleaks@latest
          sudo mv $(go env GOPATH)/bin/betterleaks /usr/local/bin/betterleaks

      - name: Clone External Test Repositories
        run: |
          mkdir -p /tmp/test-repos
          git clone https://github.com/GitGuardian/sample_secrets.git /tmp/test-repos/sample_secrets
          git clone https://github.com/dxa4481/truffleHogRegexes.git /tmp/test-repos/truffleHogRegexes
          git clone https://github.com/crenoxhq/serverless-node-api-boilerplate.git /tmp/test-repos/boilerplate

      - name: Generate Large Test File (10 MB stress test)
        run: |
          python3 - <<'EOF'
          import os, random, string
          os.makedirs("/tmp/test-repos/large_file_test", exist_ok=True)
          
          # Generate 80,000 lines of noise
          lines = []
          for i in range(80000):
              lines.append(f"# {''.join(random.choices(string.ascii_letters + string.digits, k=100))}\n")
          
          # Plant exactly 3 secrets (obfuscated from GHA push protection checks)
          lines[10000] = 'AWS_ACCESS_KEY' + '_ID="AKIAIOSFODNN7EX' + 'AMPLE"\n'
          lines[40000] = 'STRIPE_SE' + 'CRET="sk_li' + 've_51HxXxXxXxXxXxXxXxXxXxXxXxXxXxXxXx"\n'
          lines[70000] = 'MONGO_U' + 'RI="mongodb+s' + 'rv://testuser:hub24aoeu@gg-is-awesome.mongodb.net/test"\n'
          
          with open("/tmp/test-repos/large_file_test/large_test_file.txt", "w") as f:
              f.writelines(lines)
          print("Generated 10MB test file successfully.")
          EOF

      - name: Run Benchmark Script
        run: |
          python3 scripts/run_benchmark.py

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark_report.md
